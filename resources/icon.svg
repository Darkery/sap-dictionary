<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- Table outline -->
  <rect x="1" y="1" width="10" height="10" rx="1" stroke="currentColor" stroke-width="1.2"/>
  <!-- Header row -->
  <line x1="1" y1="4" x2="11" y2="4" stroke="currentColor" stroke-width="1.2"/>
  <!-- Column divider -->
  <line x1="6" y1="4" x2="6" y2="11" stroke="currentColor" stroke-width="1"/>
  <!-- Row divider -->
  <line x1="1" y1="7.5" x2="11" y2="7.5" stroke="currentColor" stroke-width="0.8"/>
  <!-- Magnifying glass -->
  <circle cx="11.5" cy="11.5" r="3" stroke="currentColor" stroke-width="1.2"/>
  <line x1="13.8" y1="13.8" x2="15.2" y2="15.2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
</svg>
