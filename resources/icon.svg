<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Table header (solid fill) -->
  <rect x="1" y="1" width="14" height="4.5" rx="1.5" fill="currentColor"/>
  <!-- Table border -->
  <rect x="1" y="1" width="14" height="15" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.6"/>
  <!-- Column divider -->
  <line x1="8.5" y1="5.5" x2="8.5" y2="16" stroke="currentColor" stroke-width="1.2"/>
  <!-- Row dividers -->
  <line x1="1" y1="9.5"  x2="15" y2="9.5"  stroke="currentColor" stroke-width="1.2"/>
  <line x1="1" y1="13"   x2="15" y2="13"   stroke="currentColor" stroke-width="1.2"/>
  <!-- Magnifying glass -->
  <circle cx="18.5" cy="18.5" r="4" fill="none" stroke="currentColor" stroke-width="1.8"/>
  <line x1="21.3" y1="21.3" x2="23" y2="23" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
</svg>
